<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestalt – PC Builder AI</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: auto; padding: 1rem; }
    #log { background: #f0f0f0; padding: 10px; margin-top: 20px; white-space: pre-wrap; }
    #result { margin-top: 16px; }
    #result table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    #result th, #result td { border: 1px solid #ccc; padding: 6px 8px; text-align: left; }
    #result tfoot td { font-weight: bold; }
    .error { color: #b00020; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>⚡ Gestalt – PC Builder AI</h1>
  <textarea id="prompt" rows="3" cols="60" placeholder="Describe your build...">Build me a gaming PC for $1000</textarea><br>
  <button type="button" id="build-btn">Build My PC</button>
  <div id="log"></div>
  <div id="result"></div>
  <script>
    function formatBuildTable(build) {
      if (!build || typeof build !== "object") return "";
      const rows = Object.entries(build).map(
        ([key, part]) =>
          "<tr><td>" +
          key +
          "</td><td>" +
          (part.name || "—") +
          "</td><td>$" +
          (part.price != null ? part.price : "—") +
          "</td></tr>"
      );
      return (
        "<table><thead><tr><th>Part</th><th>Name</th><th>Price</th></tr></thead><tbody>" +
        rows.join("") +
        "</tbody></table>"
      );
    }

    async function runBuild() {
      const prompt = document.getElementById("prompt").value;
      const logEl = document.getElementById("log");
      const resultEl = document.getElementById("result");
      logEl.textContent = "Processing...";
      resultEl.innerHTML = "";
      try {
        const response = await fetch("/build", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });
        const data = await response.json();
        if (!response.ok) {
          logEl.textContent = "";
          resultEl.innerHTML =
            '<p class="error">Request failed: ' +
            (data.error || response.statusText) +
            "</p>";
          return;
        }
        logEl.textContent = data.analysis || "";
        if (data.success && data.build) {
          let html = formatBuildTable(data.build);
          if (data.total != null) {
            html +=
              "<p><strong>Total:</strong> $" +
              data.total +
              (data.savings != null
                ? " &nbsp;|&nbsp; <strong>Est. savings vs prebuilt:</strong> $" + data.savings
                : "") +
              "</p>";
          }
          resultEl.innerHTML = html;
        } else {
          resultEl.innerHTML =
            '<p class="error">' + (data.error || "Build could not be completed.") + "</p>";
        }
      } catch (e) {
        logEl.textContent = "";
        resultEl.innerHTML = '<p class="error">Network error: ' + e.message + "</p>";
      }
    }

    document.getElementById("build-btn").addEventListener("click", runBuild);
  </script>
</body>
</html>
